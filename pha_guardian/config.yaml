name: "PHA Guardian"
version: "0.0.61"
slug: "pha_guardian_dev"
description: "Guardian API monitoring tool (fixed Dockerfile copy)"
homeassistant_api: true
hassio_api: true
hassio_role: admin        # ← REQUIRED FOR SUPERVISOR TOKEN
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
host_network: true
init: false
privileged: []
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Guardian API"
map:
  - "config:rw"
  - "share:rw"
  - "supervisor_token:rw"
options: {}
schema: {}

