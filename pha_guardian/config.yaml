name: "PHA Guardian"
version: "0.0.65" # Incremented version to ensure a clean rebuild
slug: "pha_guardian_dev"
description: "Guardian API monitoring tool"
homeassistant_api: true
hassio_api: true
hassio_role: admin
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
host_network: true
init: false
privileged: []
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Guardian API"
map:
  - "config:rw"
  - "share:rw"
# Removed supervisor_token from map; it's handled via hassio_api: true
options: {}
schema: {}

